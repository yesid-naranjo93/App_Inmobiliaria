<!DOCTYPE html>
<html lang="es">
<head>

    <title> Inmobilaria - Acceso admin</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

        <h2>Panel Administrativo</h2>

    </div>

    <!-- Asegúrate de que la ruta tenga el punto al principio -->
    <script src="./js/login.js"></script>
</body>
</html>
