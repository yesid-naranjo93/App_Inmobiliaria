<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title> Inmobilaria - Acceso admin</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="contenedor-login">
        <h2>Panel Administrativo</h2>

        <!-- Agregamos la etiqueta form con el ID que busca tu JS -->
        <form id="formulario-login">
            <input type="text" id="usuario" placeholder="Nombre de usuario" required />
            <input type="password" id="password" placeholder="Contraseña" required />

            <!-- Cambia el id a 'btnEntrar' si así está en tu JS, o simplemente deja que el submit del form lo maneje -->
            <button type="submit" id="btnEntrar">Entrar</button>
            <button type="button" id="btn-registrar">Crear Admin</button>
        </form>

        <p id="mensaje-error"></p>
    </div>

    <!-- Asegúrate de que la ruta tenga el punto al principio -->
    <script src="./js/login.js"></script>
</body>
</html>
