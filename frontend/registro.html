<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar Inmueble</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav style="text-align: center; padding: 20px; background: #2c3e50;">
        <a href="index.html" style="color: white; margin: 0 15px; text-decoration: none;">🏠 Inicio</a>
        <a href="registro.html" style="color: white; margin: 0 15px; text-decoration: none;">➕ Publicar</a>
    </nav>
    <div class="form-container">
        <h2>Publicar Nuevo Inmueble</h2>
        <form id="form-registro">
            <input type="text" id="titulo" placeholder="Título (ej: Casa campestre)" required>
            <textarea id="descripcion" placeholder="Descripción detallada" required></textarea>
            <input type="number" id="precio" placeholder="Precio en COP" required>
            <input type="text" id="ubicacion" placeholder="Ciudad o Barrio" required>
            <input type="number" id="habitaciones" placeholder="Número de habitaciones" required>
            <input type="url" id="imagen_url" placeholder="Link de la imagen (URL)" required>
            <button type="submit">Guardar Inmueble</button>
        </form>
        <a href="index.html">Volver al catálogo</a>
    </div>

    <script>
        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue

            const datos = {
                titulo: document.getElementById('titulo').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                ubicacion: document.getElementById('ubicacion').value,
                habitaciones: parseInt(document.getElementById('habitaciones').value),
                imagen_url: document.getElementById('imagen_url').value
            };

            const resp = await fetch('http://127.0.0.1:8000/inmuebles', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });

            if(resp.ok) {
                alert("¡Inmueble publicado!");
                window.location.href = 'index.html';
            } else {
                alert("Error al guardar");
            }
        });
    </script>
</body>
</html>
